
spring:
  application:
    name: ms-config-server
  profiles:
    active: default
  cloud:
    config:
      server:
        git:
          uri: https://github.com/raulchin/microservice-configs-sigap.git
          default-label: main
          clone-on-start: true
          username: raulchin
          password:
server:
  port: 7777

eureka:
  instance:
    instance-id: "${spring.application.name}:${random.value}"
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
