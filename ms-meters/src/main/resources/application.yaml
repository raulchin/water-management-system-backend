
spring:
  application:
    name: ms-meters
  profiles:
    default: default
  config:
    import: "optional:configserver:http://localhost:7777"
  datasource:
    url: ${spring.datasource.url}
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${spring.datasource.hikari.maximum-pool-size}
      connection-timeout: ${spring.datasource.hikari.connection-timeout}
  jpa:
    hibernate:
      ddl-auto: update  # Crea/Actualiza las tablas automaticamente a partir de las entidades
    show-sql: true      # Permite mostrar las consultas en la consola
server:
  port: 4043
  servlet:
    context-path: /ms-meters

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId}] - %msg%n"

eureka:
  instance:
    instance-id: "${spring.application.name}:${random.value}"
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
